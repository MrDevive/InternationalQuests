# Время в секундах между сбросом квестов (по умолчанию 24 часа)
reset-time: 86400

# Время в секундах между сбросом еженедельных квестов (7 дней)
weekly-reset-time: 604800

# Настройки смены квестов
quest-swap:
  # Максимальное количество смен квестов за период
  max-swaps: 3
  # Период сброса счётчика смен (в секундах, по умолчанию 24 часа)
  reset-swaps-time: 86400