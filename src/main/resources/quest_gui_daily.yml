gui:
  title: "&6Ежедневные квесты"
  size: 54
  slots:
    - 20
    - 22
    - 24

  # Настройки расположения специальных кнопок
  info-slot: 4  # Слот для информационной кнопки (часы)
  back-slot: 49  # Слот для кнопки возврата
  close-slot: 53  # Слот для кнопки закрытия меню

  # Настройки кнопки возврата
  back-button:
    material: ARROW
    name: "&e← Назад"
    lore:
      - "&7Вернуться в главное меню"

  # Настройки кнопки закрытия
  close-button:
    material: BARRIER
    name: "&cЗакрыть меню"
    lore:
      - "&7Нажмите чтобы закрыть"